# Phase 2+ infrastructure (not required for the MVP research loop, which
# runs on local Parquet). Uncomment as phases land, per TDD Part 11.
version: "3.9"
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: quantis
      POSTGRES_PASSWORD: quantis_dev   # dev only — Vault/KMS in staging+
      POSTGRES_DB: quantis
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # kafka, mlflow, grafana join in Phases 2–4

volumes:
  timescale_data:
